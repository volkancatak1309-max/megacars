<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/hero/hero-poster.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="MEGACARS — sorgfältig ausgewählte Premium-Gebrauchtwagen." />
    <title>MEGACARS — Premium Gebrauchtwagen</title>
    <!-- Boot theme before paint (no flash; dark default per DESIGN.md) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mc-theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.background = t === 'light' ? '#ffffff' : '#000000';
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.background = '#000000';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
